<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nieuws — Updates uit het Asiel | Hope for Dogs</title>
  <meta name="description" content="Blijf op de hoogte van het laatste nieuws van Hope for Dogs. Reddingsverhalen, updates uit het asiel en meer over onze straathonden.">
  <link rel="canonical" href="https://www.hopefordogseurope.com/nieuws.html">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Hope for Dogs">
  <meta property="og:title" content="Nieuws — Updates uit het Asiel | Hope for Dogs">
  <meta property="og:description" content="Blijf op de hoogte van het laatste nieuws van Hope for Dogs. Reddingsverhalen, updates uit het asiel en meer.">
  <meta property="og:url" content="https://www.hopefordogseurope.com/nieuws.html">
  <meta property="og:image" content="https://www.hopefordogseurope.com/images/hero-1.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css?v=20">
  <style>
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }

    .container {
      max-width: 1560px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ========== HERO SOCIAL BUTTONS ========== */
    .hero-social-follow {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-top: 24px;
    }

    .hero-social-follow .social-follow-icon {
      height: 36px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      text-decoration: none;
      transition: opacity 0.2s;
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    .hero-social-follow .social-follow-icon:hover {
      opacity: 0.9;
    }

    .hero-social-follow .social-follow-icon.tiktok {
      background: #000;
    }

    .hero-social-follow .social-follow-icon.facebook {
      background: #1877F2;
    }

    .hero-social-follow .social-follow-icon svg {
      width: 18px;
      height: 18px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* ========== BLOG TIMELINE ========== */
    .blog-section {
      padding: 48px 0 100px;
    }

    .blog-timeline {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      padding-left: 40px;
    }

    .blog-timeline::before {
      content: '';
      position: absolute;
      left: 15px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(0, 0, 0, 0.08);
    }

    .blog-post {
      position: relative;
      margin-bottom: 40px;
      display: flex;
      gap: 24px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .blog-post:hover {
      transform: translateX(4px);
    }

    .blog-post:hover .blog-dot {
      transform: translateX(-4px);
    }

    .blog-post:last-child {
      margin-bottom: 0;
    }

    .blog-dot {
      position: absolute;
      left: -33px;
      top: 24px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--brand);
      border: 3px solid var(--white);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.08);
      z-index: 1;
    }

    .blog-post-img {
      width: 400px;
      height: 280px;
      border-radius: 16px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--beige);
    }

    .blog-post-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .blog-post-title {
      text-transform: none;
    }

    .blog-post-date {
      text-transform: none;
    }

    .blog-post-excerpt {
      text-transform: none;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
    }

    .blog-post-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 700;
      color: var(--brand);
      transition: gap 0.2s;
    }

    .blog-post:hover .blog-post-link {
      gap: 10px;
    }

    .blog-post-link svg {
      width: 14px;
      height: 14px;
      fill: var(--brand);
    }

    /* Loading */
    .blog-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      gap: 12px;
      color: var(--dark-2);
      font-size: 15px;
    }
    .mini-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0,0,0,0.1);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--dark-2);
    }
    .empty-state p {
      font-size: 18px;
      font-weight: 500;
    }

    /* ========== RESPONSIVE ========== */
    /* --- SM: 768–1023px --- */
    @media (max-width: 1023px) {
      .blog-post-img {
        width: 300px;
        height: 210px;
      }
    }

    /* --- XS: 0–767px --- */
    @media (max-width: 767px) {
      .container { padding: 0 20px; }
      .blog-timeline { padding-left: 32px; }
      .blog-timeline::before { left: 11px; }
      .blog-dot { left: -29px; }

      .blog-post {
        flex-direction: column;
        gap: 16px;
      }

      .blog-post-img {
        width: 100%;
        height: auto;
        aspect-ratio: 10 / 7;
      }

      .blog-post-excerpt {
        -webkit-line-clamp: 3;
      }
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main>
  <!-- ========== PAGE HERO ========== -->
  <section class="page-hero">
    <div class="page-hero-inner">
      <h1 data-i18n="nieuws.hero">Actueel</h1>
      <p>Bekijk hier onze recente bezigheden</p>
      <div class="hero-social-follow">
        <a href="https://www.tiktok.com/@hope_for_dogs_europe" target="_blank" rel="noopener" class="social-follow-icon tiktok" title="TikTok">
          <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 00-.79-.05A6.34 6.34 0 003.15 15.2a6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.34-6.34V8.73a8.19 8.19 0 004.76 1.52V6.8a4.84 4.84 0 01-1-.11z"/></svg>
          <span>TikTok</span>
        </a>
        <a href="https://www.facebook.com/hopefordogseurope" target="_blank" rel="noopener" class="social-follow-icon facebook" title="Facebook">
          <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          <span>Facebook</span>
        </a>
      </div>
    </div>
  </section>

  <!-- ========== BLOG TIMELINE ========== -->
  <section class="blog-section">
    <div class="container">
      <div class="blog-timeline" id="blogTimeline">
        <div class="blog-loading"><div class="mini-spinner"></div> Laden...</div>
      </div>
    </div>
  </section>

  </main>
  <div id="footer-placeholder"></div>

  <script src="components.js?v=20"></script>
  <script src="supabase-config.js"></script>
  <script>
    function formatDate(dateStr) {
      if (!dateStr) return '';
      var d = new Date(dateStr);
      var months = ['januari', 'februari', 'maart', 'april', 'mei', 'juni', 'juli', 'augustus', 'september', 'oktober', 'november', 'december'];
      return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    async function loadPosts() {
      var timeline = document.getElementById('blogTimeline');
      try {
        var posts = await supabaseGet('posts', 'select=*&order=published_at.desc');

        if (!posts || posts.length === 0) {
          timeline.innerHTML = '<div class="empty-state"><p>Er zijn nog geen nieuwsberichten geplaatst.</p></div>';
          return;
        }

        timeline.innerHTML = posts.map(function(post) {
          var img = post.photo_url || '';
          var date = formatDate(post.published_at || post.created_at);
          var excerpt = post.excerpt || '';

          return '<a href="post.html?id=' + post.id + '" class="blog-post">' +
            '<div class="blog-dot"></div>' +
            (img ? '<img src="' + img + '" alt="' + escapeHtml(post.title).replace(/"/g, '&quot;') + '" class="blog-post-img" loading="lazy">' : '') +
            '<div class="blog-post-content">' +
              '<div class="blog-post-date t-body-sm">' + date + '</div>' +
              '<div class="blog-post-title t-heading-sm">' + escapeHtml(post.title) + '</div>' +
              '<div class="blog-post-excerpt t-body-sm">' + escapeHtml(excerpt) + '</div>' +
              '<span class="blog-post-link">Lees meer <svg viewBox="0 0 16 16"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span>' +
            '</div>' +
          '</a>';
        }).join('');
      } catch (err) {
        console.error('Error loading posts:', err);
        timeline.innerHTML = '<div class="empty-state"><p>Er is een fout opgetreden bij het laden.</p></div>';
      }
    }

    loadPosts();
  </script>
</body>
</html>
