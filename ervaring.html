<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adoptieverhaal | Hope for Dogs</title>
  <meta name="description" content="Lees dit adoptieverhaal van Hope for Dogs. Ontdek hoe een straathond uit Bosnie of Servie een liefdevol thuis vond.">
  <link rel="canonical" href="https://www.hopefordogseurope.com/ervaring.html">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Hope for Dogs">
  <meta property="og:title" content="Adoptieverhaal | Hope for Dogs">
  <meta property="og:description" content="Lees dit adoptieverhaal van Hope for Dogs. Ontdek hoe een straathond een liefdevol thuis vond.">
  <meta property="og:url" content="https://www.hopefordogseurope.com/ervaring.html">
  <meta property="og:image" content="https://www.hopefordogseurope.com/images/hero-1.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css?v=20">
  <style>
    body {
      font-family: 'Manrope', sans-serif;
      color: var(--dark-1);
      background: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }

    /* ========== LAYOUT ========== */
    .story-section {
      max-width: 1560px;
      margin: 0 auto;
      padding: 128px 40px 80px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      color: var(--dark-2);
      margin-bottom: 32px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--brand); }
    .back-link svg { width: 16px; height: 16px; }

    .story-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: start;
    }

    /* ========== PHOTO GALLERY ========== */
    .story-gallery {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ============ IMAGE CAROUSEL ============ */
    .carousel {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      background: var(--beige);
      aspect-ratio: 4/3;
      user-select: none;
    }

    .carousel-track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.3s ease;
    }

    .carousel-slide {
      min-width: 100%;
      height: 100%;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: background 0.2s, transform 0.2s;
      z-index: 2;
    }

    .carousel-btn:hover {
      background: var(--white);
      transform: translateY(-50%) scale(1.05);
    }

    .carousel-btn svg { width: 20px; height: 20px; }
    .carousel-prev { left: 16px; }
    .carousel-next { right: 16px; }

    .carousel-dots {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 2;
    }

    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    .carousel-dot.active {
      background: var(--white);
      transform: scale(1.3);
    }

    .carousel-thumbs {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .carousel-thumb {
      width: 64px;
      height: 64px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }

    .carousel-thumb.active { border-color: var(--brand); }
    .carousel-thumb img { width: 100%; height: 100%; object-fit: cover; }


    /* ========== STORY INFO ========== */
    .story-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .story-name {
      margin-bottom: -8px;
    }

    .story-adopter {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark-2);
    }

    .story-text {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.8;
      color: var(--dark-2);
      white-space: pre-line;
    }

    .story-cta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding-top: 8px;
    }

    /* ========== LOADING / ERROR ========== */
    .loading-screen, .error-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,0,0,0.1);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== RESPONSIVE ========== */
    /* --- SM: 768–1023px --- */
    @media (max-width: 1023px) {
      /* Responsive type */
      .story-text { font-size: 15px; }

      .story-section { padding: 160px 40px 80px; }
      .story-grid { grid-template-columns: 1fr; gap: 40px; }
    }

    /* --- XS: 0–767px --- */
    @media (max-width: 767px) {
      .story-section { padding: 160px 20px 60px; }
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main>
  <!-- Loading -->
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <span style="color:var(--dark-2);font-size:15px;">Laden...</span>
  </div>

  <!-- Error -->
  <div class="error-screen" id="errorScreen" style="display:none;">
    <h2>Verhaal niet gevonden</h2>
    <p>Dit verhaal bestaat niet of is verwijderd.</p>
    <a href="ervaringen.html" class="btn-primary">Bekijk alle ervaringen</a>
  </div>

  <!-- Story Detail -->
  <section class="story-section" id="storySection" style="display:none;">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="index.html">Home</a>
      <span class="breadcrumb-sep">/</span>
      <a href="ervaringen.html">Ervaringen</a>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-current" id="breadcrumbName"></span>
    </nav>

    <div class="story-grid">
      <div class="story-gallery">
        <div class="carousel" id="storyCarousel">
          <div class="carousel-track" id="storyCarouselTrack"></div>
          <button class="carousel-btn carousel-prev" id="storyPrev">
            <svg viewBox="0 0 16 16"><path d="M10 3l-5 5 5 5" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="carousel-btn carousel-next" id="storyNext">
            <svg viewBox="0 0 16 16"><path d="M6 3l5 5-5 5" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="carousel-dots" id="storyDots"></div>
        </div>
        <div class="carousel-thumbs" id="storyThumbs"></div>
      </div>

      <div class="story-info">
        <h1 class="story-name t-heading-lg" id="storyName"></h1>
        <div class="story-adopter" id="storyAdopter"></div>
        <div class="story-text" id="storyText"></div>
        <div class="story-cta">
          <a href="#" class="btn-secondary" id="nextStoryBtn">Volgend verhaal <svg viewBox="0 0 16 16" width="16" height="16" style="fill:none;"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
        </div>
      </div>
    </div>
  </section>

  </main>
  <div id="footer-placeholder"></div>

  <script src="components.js?v=20"></script>
  <script src="supabase-config.js"></script>
  <script>
    var allStoryIds = [];
    var currentStoryId = null;
    var storyCurrentSlide = 0;
    var storyImages = [];
    var storyTouchStartX = 0;
    var storyTouchEndX = 0;

    var storyCarouselBound = false;

    function initStoryCarousel(images, dogName) {
      storyImages = images;
      storyCurrentSlide = 0;
      var track = document.getElementById('storyCarouselTrack');
      var dots = document.getElementById('storyDots');
      var thumbs = document.getElementById('storyThumbs');

      // Build slides
      track.innerHTML = images.map(function(url) {
        return '<div class="carousel-slide"><img src="' + url + '" alt="Foto van ' + dogName + '"></div>';
      }).join('');

      // Build dots
      dots.innerHTML = images.map(function(_, i) {
        return '<button class="carousel-dot ' + (i === 0 ? 'active' : '') + '" data-index="' + i + '"></button>';
      }).join('');

      // Build thumbs
      thumbs.innerHTML = images.map(function(url, i) {
        return '<div class="carousel-thumb ' + (i === 0 ? 'active' : '') + '" data-index="' + i + '"><img src="' + url + '" alt="Foto ' + (i + 1) + ' van ' + dogName + '"></div>';
      }).join('');

      // Hide nav if only 1 image
      if (images.length <= 1) {
        document.getElementById('storyPrev').style.display = 'none';
        document.getElementById('storyNext').style.display = 'none';
        dots.style.display = 'none';
        thumbs.style.display = 'none';
      } else {
        document.getElementById('storyPrev').style.display = '';
        document.getElementById('storyNext').style.display = '';
        dots.style.display = '';
        thumbs.style.display = '';
      }

      // Bind event listeners only once
      if (!storyCarouselBound) {
        storyCarouselBound = true;

        // Dot clicks (delegated)
        dots.addEventListener('click', function(e) {
          var dot = e.target.closest('.carousel-dot');
          if (dot) goToStorySlide(parseInt(dot.dataset.index));
        });

        // Thumb clicks (delegated)
        thumbs.addEventListener('click', function(e) {
          var thumb = e.target.closest('.carousel-thumb');
          if (thumb) goToStorySlide(parseInt(thumb.dataset.index));
        });

        // Arrow clicks
        document.getElementById('storyPrev').addEventListener('click', function() {
          goToStorySlide(storyCurrentSlide > 0 ? storyCurrentSlide - 1 : storyImages.length - 1);
        });

        document.getElementById('storyNext').addEventListener('click', function() {
          goToStorySlide(storyCurrentSlide < storyImages.length - 1 ? storyCurrentSlide + 1 : 0);
        });

        // Touch swipe
        var carousel = document.getElementById('storyCarousel');
        carousel.addEventListener('touchstart', function(e) {
          storyTouchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        carousel.addEventListener('touchend', function(e) {
          storyTouchEndX = e.changedTouches[0].screenX;
          var diff = storyTouchStartX - storyTouchEndX;
          if (Math.abs(diff) > 50) {
            if (diff > 0) {
              goToStorySlide(storyCurrentSlide < storyImages.length - 1 ? storyCurrentSlide + 1 : 0);
            } else {
              goToStorySlide(storyCurrentSlide > 0 ? storyCurrentSlide - 1 : storyImages.length - 1);
            }
          }
        }, { passive: true });
      }

      // Reset track position
      track.style.transform = 'translateX(0)';
    }

    function goToStorySlide(index) {
      storyCurrentSlide = index;
      var track = document.getElementById('storyCarouselTrack');
      track.style.transform = 'translateX(-' + (index * 100) + '%)';

      // Update dots
      var allDots = document.querySelectorAll('#storyDots .carousel-dot');
      for (var i = 0; i < allDots.length; i++) {
        if (i === index) allDots[i].classList.add('active');
        else allDots[i].classList.remove('active');
      }

      // Update thumbs
      var allThumbs = document.querySelectorAll('#storyThumbs .carousel-thumb');
      for (var i = 0; i < allThumbs.length; i++) {
        if (i === index) allThumbs[i].classList.add('active');
        else allThumbs[i].classList.remove('active');
      }
    }

    async function loadStory(storyId, isTransition) {
      if (!storyId) {
        var params = new URLSearchParams(window.location.search);
        storyId = params.get('id');
      }

      if (!storyId) {
        showError();
        return;
      }

      currentStoryId = storyId;

      // On initial load, show loading screen; on transition, just fade content
      if (!isTransition) {
        document.getElementById('loadingScreen').style.display = '';
        document.getElementById('storySection').style.display = 'none';
      }

      try {
        var stories = await supabaseGet('stories', 'select=*&id=eq.' + storyId);

        if (!stories || stories.length === 0) {
          showError();
          return;
        }

        var story = stories[0];
        document.title = story.dog_name + ' — Adoptieverhaal | Hope for Dogs';
        var storyDesc = story.description ? story.description.substring(0, 140) : 'Lees het adoptieverhaal van ' + story.dog_name;
        document.querySelector('meta[name="description"]').setAttribute('content', storyDesc);
        document.querySelector('meta[property="og:title"]').setAttribute('content', story.dog_name + ' — Adoptieverhaal | Hope for Dogs');
        document.querySelector('meta[property="og:description"]').setAttribute('content', storyDesc);

        document.getElementById('storyName').textContent = story.dog_name;
        document.getElementById('breadcrumbName').textContent = story.dog_name;

        // JSON-LD: BreadcrumbList schema
        var existingBcSchema = document.querySelector('script[data-schema="breadcrumb"]');
        if (existingBcSchema) existingBcSchema.remove();
        var bcSchema = document.createElement('script');
        bcSchema.type = 'application/ld+json';
        bcSchema.setAttribute('data-schema', 'breadcrumb');
        bcSchema.textContent = JSON.stringify({
          "@context": "https://schema.org",
          "@type": "BreadcrumbList",
          "itemListElement": [
            {"@type": "ListItem", "position": 1, "name": "Home", "item": "https://www.hopefordogseurope.com/"},
            {"@type": "ListItem", "position": 2, "name": "Ervaringen", "item": "https://www.hopefordogseurope.com/ervaringen.html"},
            {"@type": "ListItem", "position": 3, "name": story.dog_name}
          ]
        });
        document.head.appendChild(bcSchema);
        document.getElementById('storyAdopter').textContent = story.adopter_name ? 'Geadopteerd door ' + story.adopter_name : '';
        document.getElementById('storyText').textContent = story.full_story || story.description || '';

        // Load photos
        var photos = [];
        try {
          photos = await supabaseGet('story_photos', 'select=*&story_id=eq.' + storyId + '&order=is_primary.desc');
        } catch (e) {}

        var images = photos.map(function(p) { return p.photo_url; });
        if (images.length === 0 && story.photo_url) {
          images = [story.photo_url];
        }

        if (images.length > 0) {
          initStoryCarousel(images, story.dog_name);
          document.querySelector('meta[property="og:image"]').setAttribute('content', images[0]);
        } else {
          initStoryCarousel(['images/placeholder-dog.png'], story.dog_name);
        }

        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('storySection').style.display = 'block';

        // JSON-LD: Article schema for adoption story
        var existingStorySchema = document.querySelector('script[data-schema="story"]');
        if (existingStorySchema) existingStorySchema.remove();
        var storySchema = document.createElement('script');
        storySchema.type = 'application/ld+json';
        storySchema.setAttribute('data-schema', 'story');
        storySchema.textContent = JSON.stringify({
          "@context": "https://schema.org",
          "@type": "Article",
          "headline": story.dog_name + ' — Adoptieverhaal',
          "datePublished": story.created_at,
          "image": images.length > 0 ? images[0] : '',
          "author": {"@type": "Organization", "name": "Hope for Dogs"},
          "publisher": {"@type": "Organization", "name": "Hope for Dogs", "logo": {"@type": "ImageObject", "url": "https://www.hopefordogseurope.com/logo.png"}},
          "description": story.description || ''
        });
        document.head.appendChild(storySchema);

        // Scroll to top on transition
        if (isTransition) {
          window.scrollTo({ top: 0 });
        }

        // Update URL without reload
        history.replaceState(null, '', 'ervaring.html?id=' + storyId);

        // Set up "next story" button
        if (allStoryIds.length === 0) {
          try {
            var all = await supabaseGet('stories', 'select=id&order=sort_order.asc.nullslast,created_at.desc');
            allStoryIds = all.map(function(s) { return s.id; });
          } catch(e) {}
        }

        var nextBtn = document.getElementById('nextStoryBtn');
        if (allStoryIds.length > 1) {
          var idx = allStoryIds.indexOf(storyId);
          var nextIdx = (idx + 1) % allStoryIds.length;
          nextBtn.dataset.nextId = allStoryIds[nextIdx];
          nextBtn.style.display = '';
        } else {
          nextBtn.style.display = 'none';
        }

      } catch (err) {
        console.error('Error loading story:', err);
        showError();
      }
    }

    // Next story: swap content in-place, lock height to prevent layout shift
    document.getElementById('nextStoryBtn').addEventListener('click', function(e) {
      e.preventDefault();
      var nextId = this.dataset.nextId;
      if (!nextId) return;
      var section = document.getElementById('storySection');
      // Lock current height so footer doesn't jump
      section.style.minHeight = section.offsetHeight + 'px';
      loadStory(nextId, true).then(function() {
        // Release after a frame so layout settles
        requestAnimationFrame(function() {
          section.style.minHeight = '';
        });
      });
    });

    function showError() {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('errorScreen').style.display = 'flex';
    }

    loadStory();
  </script>
</body>
</html>
